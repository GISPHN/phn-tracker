<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f5e5e" />
    <title>GIS-PHN Tracker</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="control-panel" aria-label="操作パネル">
        <header class="brand">
          <div>
            <h1>GIS-PHN Tracker</h1>
          </div>
          <span class="sync-pill" id="connectionState">起動中</span>
        </header>

        <section class="panel-section mode-section">
          <button class="primary mode-button" id="fieldModeBtn" type="button"><span>スマホ</span>現地モード</button>
          <button class="mode-button" id="hqModeBtn" type="button"><span>PC・本部</span>本部モード</button>
        </section>

        <section class="panel-section session-section" id="sessionSection">
          <h2 class="field-only">参加者登録</h2>
          <h2 class="hq-mode-only">訓練の開始</h2>
          <label class="session-row">訓練セッションID<input id="sessionInput" type="text" value="nara-training-001" /></label>
          <label class="session-row">アクセスコード<input id="accessCodeInput" type="text" inputmode="latin" autocomplete="off" placeholder="本部から共有されたコード" /></label>
          <div class="field-grid field-only participant-fields">
            <label>自治体名<input id="municipalityInput" type="text" autocomplete="organization" value="奈良市" /></label>
            <label>姓<input id="surnameInput" type="text" autocomplete="family-name" value="山田" /></label>
            <label>チーム<input id="teamInput" type="text" placeholder="例: 奈良市保健師チーム" /></label>
          </div>
          <div class="track-controls field-only">
            <button class="primary" id="registerParticipant" type="button">参加者登録</button>
          </div>
          <p class="hint field-only" id="registrationHint">セッションIDとアクセスコードを入力し、参加者登録を押してください。</p>
          <div class="track-controls hq-mode-only">
            <button class="primary" id="createSession" type="button">訓練作成</button>
            <button id="copyShareLink" type="button">共有URL</button>
          </div>
          <div class="session-picker hq-mode-only">
            <label>既存セッション<select id="sessionList"><option value="">読み込み中...</option></select></label>
            <div class="track-controls">
              <button id="loadSessionList" type="button">一覧更新</button>
              <button id="selectSession" type="button">選択して表示</button>
            </div>
          </div>
          <p class="hint hq-mode-only" id="shareHint"></p>
          <div class="qr-card hq-mode-only" id="qrCard">
            <div class="qr-frame"><canvas id="shareQr" width="196" height="196" aria-label="参加者共有URLのQRコード"></canvas></div>
            <p class="hint" id="qrHint">訓練作成後にQRコードを表示します。</p>
          </div>
          <p class="hint" id="syncHint">同期未設定: この端末内のデータのみ表示しています。</p>
        </section>

        <section class="panel-section field-only" id="trackingSection">
          <h2>位置送信</h2>
          <div class="track-controls">
            <button class="primary" id="toggleTracking" type="button">活動開始</button>
            <button id="sendNow" type="button">手動送信</button>
          </div>
          <div class="track-controls">
            <button id="loadNearbyPoi" type="button">周辺POI</button>
            <button id="clearNearbyPoi" type="button">POI消去</button>
          </div>
          <div class="field-grid">
            <label>
              更新間隔
              <select id="intervalSelect">
                <option value="30000">30秒</option>
                <option value="60000" selected>1分</option>
                <option value="180000">3分</option>
                <option value="300000">5分</option>
                <option value="0">手動のみ</option>
              </select>
            </label>
            <label>
              ステータス
              <select id="statusSelect">
                <option>移動中</option>
                <option>訪問中</option>
                <option>待機中</option>
                <option>休憩中</option>
                <option>本部帰着</option>
                <option>要連絡</option>
                <option>本日の活動終了</option>
                <option>活動終了</option>
              </select>
            </label>
          </div>
          <p class="hint" id="nearbyPoiHint">周辺POIは現在地から半径500mだけ一時表示し、記録には保存しません。</p>
          <p class="hint">スマホの位置は端末内保存に加え、同期設定時は本部画面へ反映されます。</p>
        </section>

        <section class="panel-section field-only" id="memoSection">
          <h2>メモ</h2>
          <textarea id="memoInput" rows="3" placeholder="例: 避難所へ移動開始。道路混雑あり。"></textarea>
          <div class="track-controls">
            <button id="saveMemo" type="button">位置付きメモ</button>
            <button id="centerMap" type="button">現在地へ</button>
          </div>
        </section>

        <section class="panel-section">
          <h2>本部ビュー</h2>
          <div class="metric-grid">
            <div><span id="activeCount">0</span><small>活動中</small></div>
            <div><span id="staleCount">0</span><small>要確認</small></div>
            <div><span id="memoCount">0</span><small>メモ</small></div>
            <div><span id="queuedCount">0</span><small>未同期</small></div>
            <div><span id="teamCount">0</span><small>チーム</small></div>
            <div><span id="lastUpdateText">-</span><small>最終更新</small></div>
          </div>
          <div class="field-grid">
            <label>
              表示チーム
              <select id="teamFilter">
                <option value="all">全チーム</option>
              </select>
            </label>
            <label>
              背景地図
              <select id="basemapSelect">
                <option value="osmfj-poi">OSMFJ POI</option>
                <option value="osm-bright">OSM Bright</option>
                <option value="gsi-photo">全国最新写真</option>
              </select>
            </label>
            <label class="checkbox-row"><input id="showTracks" type="checkbox" checked />移動履歴</label>
          </div>
          <div class="track-controls">
            <button id="addDemo" type="button">デモ追加</button>
            <button id="exportCsv" type="button">CSV</button>
            <button id="exportGeojson" type="button">GeoJSON</button>
            <button id="exportSvgmap" type="button">SVGMap</button>
          </div>
          <div class="hq-dashboard" id="hqDashboard">
            <h2>チーム状況</h2>
            <div id="teamSummaryList" class="summary-list"></div>
            <h2>要確認</h2>
            <div id="staleList" class="summary-list"></div>
          </div>
        </section>
      </aside>

      <main class="map-stage">
        <div id="map" aria-label="奈良県周辺の活動地図"></div>
        <div class="creator-credit">作成者: <a href="https://x.com/GISPHN" target="_blank" rel="noopener noreferrer">GISPHN</a></div>
        <div class="activity-drawer" aria-label="活動ログ">
          <div class="drawer-header">
            <h2>活動ログ</h2>
            <button id="clearDemo" type="button">デモ削除</button>
          </div>
          <ul id="activityList"></ul>
        </div>
      </main>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
    <script src="./app-config.js"></script>
    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
